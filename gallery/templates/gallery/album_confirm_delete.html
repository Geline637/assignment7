<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Album - {{ album.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📸 Photo Album Manager</a>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h3 class="mb-0">⚠️ Delete Album</h3>
                    </div>
                    <div class="card-body">
                        <p class="lead">Are you sure you want to delete the album <strong>"{{ album.name }}"</strong>?</p>
                        
                        <div class="alert alert-warning">
                            <strong>Warning:</strong> This action cannot be undone!
                            <ul class="mt-2 mb-0">
                                <li>The album <strong>"{{ album.name }}"</strong> will be permanently deleted</li>
                                <li>All photos in this album will also be deleted</li>
                            </ul>
                        </div>
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-danger">🗑️ Yes, Delete Album</button>
                                <a href="/album/{{ album.pk }}/" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
