<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ photo.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .photo-image {
            max-height: 500px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📸 Photo Album Manager</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Albums</a></li>
                <li class="breadcrumb-item"><a href="/album/{{ photo.album.pk }}/">{{ photo.album.name }}</a></li>
                <li class="breadcrumb-item active">{{ photo.title }}</li>
            </ol>
        </nav>
        
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    {% if photo.image %}
                        <img src="{{ photo.image.url }}" class="card-img-top photo-image" alt="{{ photo.title }}">
                    {% endif %}
                    <div class="card-body">
                        <h2>{{ photo.title }}</h2>
                        <p>{{ photo.description }}</p>
                        <p class="text-muted">Uploaded: {{ photo.uploaded_at|date:"F d, Y H:i" }}</p>
                        <div class="btn-group">
                            <a href="/album/{{ photo.album.pk }}/" class="btn btn-secondary">Back to Album</a>
                            <a href="/photo/{{ photo.pk }}/delete/" class="btn btn-danger">Delete Photo</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
