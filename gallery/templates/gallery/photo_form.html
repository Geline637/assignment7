<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Photo - {{ album.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📸 Photo Album Manager</a>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h2>Upload Photo to {{ album.name }}</h2>
                    </div>
                    <div class="card-body">
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="id_title" class="form-label">Title:</label>
                                <input type="text" name="title" id="id_title" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="id_description" class="form-label">Description:</label>
                                <textarea name="description" id="id_description" class="form-control" rows="3"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="id_image" class="form-label">Photo Image:</label>
                                <input type="file" name="image" id="id_image" class="form-control" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Upload Photo</button>
                            <a href="/album/{{ album.pk }}/" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
